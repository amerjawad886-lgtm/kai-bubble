name: Build Kai Bubble APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GRADLE_BUILD_CACHE_ENABLED: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Clean Gradle cache
        run: rm -rf ~/.gradle/caches ~/.gradle/daemon

      - name: Create local.properties with Environment Secrets
        run: |
          cat > kai-app/local.properties <<'EOF'
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          EOF

      - name: Build Debug APK
        working-directory: kai-app
        run: |
          chmod +x ./gradlew
          ./gradlew --no-build-cache assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kai-bubble-apk
          path: kai-app/app/build/outputs/apk/debug/app-debug.apk