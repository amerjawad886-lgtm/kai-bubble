name: Build Kai Bubble APK (Placeholder)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Create placeholder APK file
        run: |
          mkdir -p build
          echo "Kai Bubble APK placeholder" > build/kai-bubble.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kai-bubble-apk
          path: build/kai-bubble.apk
