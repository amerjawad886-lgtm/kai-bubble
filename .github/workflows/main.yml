name: Build Kai Bubble APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install JDK
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      - name: Create Android Project
        run: |
          mkdir -p app/src/main/java/com/kai/bubble
          mkdir -p app/src/main/res/layout

          cat <<EOF > app/src/main/java/com/kai/bubble/MainActivity.java
          package com.kai.bubble;

          import android.app.Activity;
          import android.os.Bundle;
          import android.widget.TextView;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  TextView tv = new TextView(this);
                  tv.setText("Kai OS Online 🚀");
                  tv.setTextSize(24);
                  setContentView(tv);
              }
          }
          EOF

      - name: Create Fake APK
        run: |
          mkdir build
          echo "Kai OS APK" > build/kai-bubble.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kai-bubble-apk
          path: build/kai-bubble.apk
